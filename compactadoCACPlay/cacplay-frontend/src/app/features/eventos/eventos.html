<div class="bg-gray-950 min-h-screen">
  
  <app-contenido-grilla 
    *ngIf="listaEventos.length > 0"
    [titulo]="'Eventos'" 
    [contenidos]="listaEventos">
  </app-contenido-grilla>

  <div *ngIf="cargando" class="flex justify-center items-center py-40">
    <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-[#C4297D]"></div>
  </div>

  <div *ngIf="!cargando && listaEventos.length === 0" class="text-center py-40">
    <p class="text-gray-600 text-sm uppercase tracking-widest font-bold">
      No hay eventos disponibles
    </p>
  </div>

</div>
