<div class="min-h-screen bg-[#0F0F0F] pt-24 px-8">
  
  <div class="mb-8">
    <h2 class="text-white text-3xl font-bold">
      Resultados para: <span class="text-[#C4297D]">"{{ terminoBusqueda }}"</span>
    </h2>
    <p class="text-gray-400 mt-2" *ngIf="!cargando">
      Se encontraron {{ resultados.length }} resultados
    </p>
  </div>

  <div *ngIf="cargando" class="flex justify-center py-20">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#C4297D]"></div>
  </div>

  <app-contenido-grilla 
    *ngIf="!cargando && resultados.length > 0"
    [titulo]="'Explorar resultados'" 
    [contenidos]="resultados">
  </app-contenido-grilla>

  <div *ngIf="!cargando && resultados.length === 0" class="text-center py-20">
    <i class="fa-solid fa-face-frown text-6xl text-gray-700 mb-4"></i>
    <p class="text-gray-500 text-xl">No encontramos nada que coincida con tu búsqueda.</p>
  </div>

</div>
