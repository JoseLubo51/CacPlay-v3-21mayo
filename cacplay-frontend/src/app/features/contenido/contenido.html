<div class="bg-gray-950 text-white min-h-screen p-8">

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

    <div class="lg:col-span-2">

      <div [class.aspect-video]="tipoContenido === 'video'" 
           class="bg-black rounded-xl overflow-hidden mb-6 transition-all duration-500 shadow-2xl">

        <iframe
          *ngIf="embedUrl"
          [src]="embedUrl"
          width="100%"
          [height]="tipoContenido === 'video' ? '100%' : '352px'" 
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen">
        </iframe>

        <div *ngIf="!embedUrl" class="flex items-center justify-center h-full text-gray-500">
          Cargando reproductor...
        </div>
      </div>

      <div *ngIf="contenido">
        <h1 class="text-3xl font-bold mb-2">
          {{ contenido.titulo }}
        </h1>

        <p class="text-gray-400 text-sm mb-4">
          {{ contenido.fecha_publicacion }}
        </p>

        <p class="text-gray-300 mb-6 italic">
          {{ contenido.descripcion }}
        </p>

        <div class="flex items-center gap-4 mb-8">
          <button (click)="toggleFavorito()" 
                  class="flex items-center gap-2 px-6 py-2.5 rounded-full border-2 transition-all font-bold text-sm uppercase tracking-wider"
                  [ngClass]="contenido?.es_favorito ? 'bg-[#C4297D] border-[#C4297D] text-white shadow-[0_0_15px_rgba(196,41,125,0.4)]' : 'border-gray-700 text-gray-400 hover:border-white hover:text-white'">
            <i class="fa-solid" [ngClass]="contenido?.es_favorito ? 'fa-check' : 'fa-plus'"></i>
            {{ contenido?.es_favorito ? 'En mi lista' : 'Agregar a mi lista' }}
          </button>
        </div>

        <hr class="border-gray-800 mb-6">

        <div class="flex items-center gap-4">
          <span class="text-gray-300 font-medium">Califica este contenido:</span>
          <div class="flex text-3xl">
            <span
              *ngFor="let star of [1,2,3,4,5]"
              (click)="setRating(star)"
              (mouseenter)="setHover(star)"
              (mouseleave)="clearHover()"
              class="cursor-pointer transition-transform duration-200 hover:scale-125 px-1"
              [class.text-yellow-400]="star <= (hoverRating || rating)"
              [class.text-gray-700]="star > (hoverRating || rating)"
            >
              ★
            </span>
          </div>
          <span *ngIf="rating > 0" class="text-xs text-green-500 font-bold animate-pulse">¡Gracias por calificar!</span>
        </div>
      </div>
    </div>

    <div>
      <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
        <span class="w-1 h-5 bg-[#C4297D]"></span>
        Contenido relacionado
      </h2>
      <div class="space-y-4">
        <div
          *ngFor="let item of relacionados"
          [routerLink]="['/contenido', item.id]"
          class="flex gap-3 bg-gray-900/50 rounded-lg p-2 hover:bg-gray-800 transition cursor-pointer border border-transparent hover:border-gray-700 group"
        >
          <div class="relative w-32 h-20 flex-shrink-0">
            <img
              [src]="item.thumbnail || 'https://picsum.photos/200/120'"
              class="w-full h-full object-cover rounded shadow-md"
            />
            <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors"></div>
          </div>
          <div class="flex flex-col justify-center">
            <p class="text-sm font-semibold leading-tight mb-1 group-hover:text-[#C4297D] transition-colors line-clamp-2">{{ item.titulo }}</p>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-tighter">{{ item.tipo }} • {{ item.fecha_publicacion }}</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
