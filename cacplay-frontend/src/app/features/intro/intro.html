<div class="relative h-screen w-full overflow-hidden bg-black text-white font-sans">
  
  <div 
    [ngClass]="{ 'opacity-100 z-50': videoActivo, 'opacity-0 pointer-events-none z-0': !videoActivo }"
    class="absolute inset-0 bg-black transition-opacity duration-1000 ease-out">
    
    <video 
      #videoSplash
      autoplay 
      muted
      playsinline 
      preload="auto" 
      (ended)="onVideoTerminado()"
      class="absolute top-1/2 left-1/2 min-w-full min-h-full w-auto h-auto -translate-x-1/2 -translate-y-1/2 object-cover">
      <source src="assets/video/CAC-PLAY.mp4" type="video/mp4">
      Tu navegador no soporta videos de fondo.
    </video>
  </div>

  <div class="absolute inset-0 bg-black/60 z-10"></div>

  <div class="relative z-20 flex flex-col justify-between h-full w-full p-6 sm:p-10 box-border">
    
    <div class="flex justify-center mt-6 sm:mt-10">
      <img src="assets/images/CACPlay.webp" alt="CAC Play" class="h-12 sm:h-16 object-contain">
    </div>

    <div class="flex flex-col items-center text-center max-w-2xl mx-auto px-4">
      <h1 class="text-4xl sm:text-5xl font-light mb-4 sm:mb-6 tracking-wide">Bienvenido</h1>
      <p class="text-lg sm:text-xl leading-relaxed mb-6 sm:mb-8 opacity-90 balance">
        Este contenido está protegido y solo puede ser consultado iniciando sesión en la página web de la Cuenta de Alto Costo
      </p>
    </div>

    <div class="flex justify-end p-2 sm:p-4">
      <button 
        (click)="onAdminLogin()" 
        title="Acceso Administrador"
        class="cursor-pointer opacity-40 hover:opacity-100 transition-opacity duration-300 focus:outline-none">
        
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 sm:h-8 sm:w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>

  </div>
</div>
