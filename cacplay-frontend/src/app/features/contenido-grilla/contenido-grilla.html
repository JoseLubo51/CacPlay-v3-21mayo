<div class="max-w-[1400px] mx-auto px-8 py-12 bg-black min-h-screen">
  
  <div class="flex items-center gap-4 mb-12">
    <div class="w-1.5 h-8 bg-[#C4297D]"></div>
    <h2 class="text-3xl font-bold text-white">{{ titulo }}</h2>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
    
    <div *ngFor="let item of contenidos" 
         (click)="goToContent(item)"
         class="group cursor-pointer">
      
      <div class="relative aspect-video rounded-2xl overflow-hidden border border-gray-800 bg-gray-900 mb-6 transition-all duration-300 group-hover:border-[#243A85] group-hover:scale-[1.02]">
        <img [src]="item.thumbnail || 'https://picsum.photos/400/225'" 
             class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
      </div>

      <div class="px-1">
        <h4 class="text-[#C4297D] text-xs font-bold uppercase tracking-widest mb-2">
            {{ item.categoria_nombre || 'Contenido' }}
        </h4>
        <h3 class="text-xl font-bold text-white mb-3 leading-tight group-hover:text-[#243A85] transition-colors">
            {{ item.titulo }}
        </h3>
        <p class="text-gray-400 text-sm leading-relaxed line-clamp-2 mb-4">
            {{ item.descripcion || 'Breve descripción del contenido para dar contexto al usuario.' }}
        </p>

        <div class="flex items-center mb-3 relative z-50"> 
  <button (click)="toggleFavorito($event, item)" 
          type="button"
          class="relative z-50 flex items-center gap-2 py-1 px-3 rounded-md border border-gray-700 text-xs font-bold uppercase transition-all bg-gray-800"
          [ngClass]="item.es_favorito ? 'bg-[#C4297D] border-[#C4297D] text-white' : 'text-gray-400 hover:text-white'">
    <i class="fa-solid" [ngClass]="item.es_favorito ? 'fa-check' : 'fa-plus'"></i>
    {{ item.es_favorito ? 'En mi lista' : 'Mi lista' }}
  </button>
</div>

        <div class="flex items-center gap-3">
          <div class="flex items-center gap-1.5">
            <span class="text-yellow-400 text-sm font-bold">⭐ {{ item.rating_promedio || '0.0' }}</span>
            <span class="text-gray-500 text-xs font-medium">({{ item.total_votos || 0 }} votos)</span>
          </div>
          <span class="text-gray-600 text-[10px] uppercase border border-gray-800 px-2 rounded">
            {{ item.tipo }}
          </span>
        </div>
      </div>

    </div>

  </div>
</div>
